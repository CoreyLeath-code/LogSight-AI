services:
  logsight:
    build: .
    image: logsight-ai:local
    command: ["health"]
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=16m,mode=1777
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
